<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Open Research Calendar</title>
    <style>
@media only screen and (max-width: 620px) {
  table.body h1 {
    font-size: 28px !important;
    margin-bottom: 10px !important;
  }

table.body p,
table.body ul,
table.body ol,
table.body td,
table.body span,
table.body a {
    font-size: 16px !important;
  }

  table.body .wrapper,
table.body .article {
    padding: 18px !important;
  }

  table.body .content {
    padding: 0 !important;
  }

  table.body .container {
    padding: 0 !important;
    width: 100% !important;
  }

  table.body .main {
    border-left-width: 0 !important;
    border-radius: 0 !important;
    border-right-width: 0 !important;
  }

  table.body .btn table {
    width: 100% !important;
  }

  table.body .btn a {
    width: 100% !important;
  }

  table.body .img-responsive {
    height: auto !important;
    max-width: 100% !important;
    width: auto !important;
  }
}
@media all {
  .ExternalClass {
    width: 100%;
  }

  .ExternalClass,
.ExternalClass p,
.ExternalClass span,
.ExternalClass font,
.ExternalClass td,
.ExternalClass div {
    line-height: 100%;
  }

  .apple-link a {
    color: inherit !important;
    font-family: inherit !important;
    font-size: inherit !important;
    font-weight: inherit !important;
    line-height: inherit !important;
    text-decoration: none !important;
  }

  #MessageViewBody a {
    color: inherit;
    text-decoration: none;
    font-size: inherit;
    font-family: inherit;
    font-weight: inherit;
    line-height: inherit;
  }

  .btn-primary table td:hover {
    background-color: #ffa75b !important;
  }

  .btn-primary a:hover {
    background-color: #ffa75b !important;
    border-color: #ffa75b !important;
  }
}
</style>
  </head>
  <body style="background-color: #fbf2e9; font-family: 'Segoe UI', Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased; font-size: 16px; line-height: 1.5; margin: 0; padding: 0; -ms-text-size-adjust: 100%; -webkit-text-size-adjust: 100%; color: #5c6675;">
    <span class="preheader" style="color: transparent; display: none; height: 0; max-height: 0; max-width: 0; opacity: 0; overflow: hidden; mso-hide: all; visibility: hidden; width: 0;">An email from the Open Research Calendar.</span>
    <table role="presentation" border="0" cellpadding="0" cellspacing="0" class="body" style="border-collapse: separate; mso-table-lspace: 0pt; mso-table-rspace: 0pt; background-color: #fbf2e9; width: 100%;" width="100%" bgcolor="#fbf2e9">
      <tr>
        <td style="font-family: 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 16px; vertical-align: top;" valign="top">&nbsp;</td>
        <td class="container" style="font-family: 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 16px; vertical-align: top; display: block; max-width: 640px; padding: 24px 12px 40px; width: 640px; margin: 0 auto;" width="640" valign="top">
          <div class="content" style="box-sizing: border-box; display: block; margin: 0 auto; max-width: 640px; padding: 10px;">

            <!-- START CENTERED WHITE CONTAINER -->
            <table role="presentation" class="main" style="border-collapse: separate; mso-table-lspace: 0pt; mso-table-rspace: 0pt; background: #ffffff; border-radius: 4px; width: 100%;" width="100%">

              <!-- START MAIN CONTENT AREA -->
              <tr>
                <td class="wrapper" style="font-family: 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 16px; vertical-align: top; box-sizing: border-box; padding: 36px 36px 30px;" valign="top">
                  <table role="presentation" border="0" cellpadding="0" cellspacing="0" style="border-collapse: separate; mso-table-lspace: 0pt; mso-table-rspace: 0pt; width: 100%;" width="100%">
                    <td style="font-family: sans-serif; font-size: 14px; vertical-align: top;" valign="top">
                        <p style="font-family: sans-serif; font-size: 14px; font-weight: normal; margin: 0; margin-bottom: 15px;"><img style="display: block; margin-left: auto; margin-right: auto;" src="https://raw.githubusercontent.com/openresearchcalendar/openresearchcalendar.github.io/master/Documents/Images/logo_wide-cropped.png" alt="" width="243" height="79"></p>
                    <tr>
                      <td style="font-family: 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 16px; vertical-align: top; color: #5c6675;" valign="top">
                        <p style="font-family: 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 24px; font-weight: 700; margin: 0 0 18px; color: #5c6675;">Hi there <span style="font-size: 20px;">&#128075;</span></p>
                        <p style="font-family: 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 500; margin: 0 0 18px;">{{{textContent}}}</p>
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>

            <!-- END MAIN CONTENT AREA -->
            </table>
            <!-- END CENTERED WHITE CONTAINER -->

            <!-- START FOOTER -->
            <div class="footer" style="clear: both; margin-top: 18px; text-align: center; width: 100%;">
              <table role="presentation" border="0" cellpadding="0" cellspacing="0" style="border-collapse: separate; mso-table-lspace: 0pt; mso-table-rspace: 0pt; width: 100%;" width="100%">
                <tr>
                  <td class="content-block" style="font-family: 'Segoe UI', Helvetica, Arial, sans-serif; vertical-align: top; padding-bottom: 14px; padding-top: 6px; color: #5c6675; font-size: 16px; text-align: center;" valign="top" align="center">
                    <table role="presentation" border="0" cellpadding="0" cellspacing="0" style="border-collapse: separate; margin: 0 auto;">
                      <tr>
                        <td style="padding: 0 6px;">
                          <a href="https://www.linkedin.com/company/open-research-calendar/" style="display: inline-block;">
                            <img src="https://raw.githubusercontent.com/openresearchcalendar/openresearchcalendar.github.io/master/Documents/Images/linkedin.svg" alt="LinkedIn" width="34" height="34" style="display: block; border-radius: 8px;">
                          </a>
                        </td>
                        <td style="padding: 0 6px;">
                          <a href="https://bsky.app/profile/openresearchcalendar.org" style="display: inline-block;">
                            <img src="https://raw.githubusercontent.com/openresearchcalendar/openresearchcalendar.github.io/master/Documents/Images/bluesky.svg" alt="Bluesky" width="34" height="34" style="display: block; border-radius: 8px;">
                          </a>
                        </td>
                        <td style="padding: 0 6px;">
                          <a href="https://mastodon.social/@openresearchcalendar" style="display: inline-block;">
                            <img src="https://raw.githubusercontent.com/openresearchcalendar/openresearchcalendar.github.io/master/Documents/Images/mastodon.svg" alt="Mastodon" width="34" height="34" style="display: block; border-radius: 8px;">
                          </a>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
                <tr>
                  <td style="padding: 6px 40px 20px;">
                    <div style="height: 2px; background: #e4d8cd; width: 100%;"></div>
                  </td>
                </tr>
                <tr>
                  <td class="content-block powered-by" style="font-family: 'Segoe UI', Helvetica, Arial, sans-serif; vertical-align: top; padding-bottom: 10px; color: #5c6675; font-size: 16px; text-align: left;" valign="top" align="left">
                    Our email address does not accept incoming mail. All contact should be made through <a href="https://github.com/openresearchcalendar/openresearchcalendar.github.io/discussions" style="color: #5c6675; text-decoration: underline;">GitHub Discussions/Issues</a>
                  </td>
                </tr>
              </table>
            </div>
            <!-- END FOOTER -->

          </div>
        </td>
        <td style="font-family: 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 16px; vertical-align: top;" valign="top">&nbsp;</td>
      </tr>
    </table>
  </body>
</html>
